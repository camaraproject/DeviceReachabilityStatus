    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: wip
  x-camara-commonalities: wip

externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/DeviceReachabilityStatus

servers:
  - url: "{apiRoot}/device-reachability-status/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root
tags:
  - name: Device reachability status
    description: Operations to get the current reachability status of a device
paths:
  /retrieve:
    post:
      tags:
        - Device reachability status
      summary: "Get the current reachability status information"
      description: Get the current reachability status information
      operationId: getReachabilityStatus
      parameters:
        - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
      security:
        - openId:
            - device-reachability-status:read
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestReachabilityStatus"
        required: true
      responses:
        "200":
          description: Contains information about current reachability status
          headers:
            x-correlator:
              $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReachabilityStatusResponse"
              examples:
                Reachable Using SMS:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    reachable: true
                    connectivity: ["SMS"]
                Reachable Using SMS With Device Disambguation:
                  value:
                    device:
                      phoneNumber: "+123456789"
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    reachable: true
                    connectivity: ["SMS"]
                Reachable Using Data:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    reachable: true
                    connectivity: ["DATA"]
                Reachable Using Data and SMS:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    reachable: true
                    connectivity: ["DATA", "SMS"]
                Not Reachable Over The Mobile Network:
                  value:
                    lastStatusTime: "2024-02-20T10:41:38.657Z"
                    reachable: false
        "400":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
        "401":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
        "403":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
        "404":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic404"
        "422":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic422"
        "429":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic429"
        "503":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic503"

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"

  schemas:
    LastStatusTime:
      description: |
        The last time that the device reachability status was confirmed to be correct by the API provider. The status should still be valid, but the API provider is unable to confirm this.
        It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      allOf:
        - $ref: "../common/CAMARA_common.yaml#/components/schemas/DateTime"

    ReachabilityStatusResponse:
      type: object
      required:
        - lastStatusTime
        - reachable
      properties:
        device:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/DeviceResponse"
        lastStatusTime:
          $ref: "#/components/schemas/LastStatusTime"
        reachable:
          description: Indicates overall device reachability
          type: boolean
        connectivity:
          type: array
          items:
            $ref: "#/components/schemas/ConnectivityType"

    ConnectivityType:
      description: |
        DATA: The device is connected to the network for Data usage (regardless of the SMS reachability)
        SMS: The device is connected to the network only for SMS usage
      type: string
      enum:
        - DATA
        - SMS

    RequestReachabilityStatus:
      description: The request to retrieve the current reachability status for the requested device.
      type: object
      properties:
        device:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Device"
